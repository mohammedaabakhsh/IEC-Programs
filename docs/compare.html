<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أداة المقارنة</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">IEC</div>
      <div><strong>مركز الابتكار</strong><span>وريادة الأعمال</span></div>
    </div>
    <div class="sidebar-search" style="padding:0 0 16px;position:relative;">
      <input type="text" id="quickSearchInput" placeholder="🔍 بحث سريع..." autocomplete="off"
        style="width:100%;box-sizing:border-box;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:12.5px;outline:none;">
      <div id="quickSearchResults" style="display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;background:#fff;border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.22);max-height:280px;overflow-y:auto;z-index:60;"></div>
    </div>
    <nav class="nav-list">
      <a href="index.html" class="nav-item"><span class="ic">🏠</span> لوحة التحكم</a>
      <a href="workshops.html" class="nav-item"><span class="ic">📋</span> الورش والبرامج</a>
      <a href="reports.html" class="nav-item active"><span class="ic">📊</span> التقارير والتحليلات</a>
      <a href="certificate.html" class="nav-item"><span class="ic">🏅</span> توليد الشهادات</a>
      <a href="settings.html" class="nav-item"><span class="ic">⚙️</span> الإعدادات</a>
    </nav>
    <div class="sidebar-foot">نظام إدارة برامج وورش<br>مركز الابتكار وريادة الأعمال</div>
  </aside>

  <main class="main-content">
    <header class="app-header">
      <h1>⚖️ أداة المقارنة</h1>
      <p><a href="reports.html" style="color:#fff;">→ العودة للتقارير</a></p>
    </header>

    <div class="page-content">
      <div class="card">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
          <div style="min-width:160px;">
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">قارن حسب</label>
            <select id="dimensionSelect">
              <option value="trainer">المدرب</option>
              <option value="type">نوع النشاط</option>
              <option value="year">السنة</option>
              <option value="organizer">الجهة المنظمة</option>
            </select>
          </div>
          <div style="min-width:200px;flex:1;">
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">الطرف الأول</label>
            <select id="value1Select"></select>
          </div>
          <div style="min-width:200px;flex:1;">
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">الطرف الثاني</label>
            <select id="value2Select"></select>
          </div>
          <button class="btn" id="compareBtn" type="button">قارن</button>
        </div>
      </div>

      <div id="content"></div>
    </div>

    <footer>نظام إدارة برامج وورش مركز الابتكار وريادة الأعمال</footer>
  </main>
</div>

<script src="assets/config.js"></script>
<script src="assets/compare.js"></script>
<script src="assets/quicksearch.js"></script>
</body>
</html>
